name: Build Whitepaper

on:
  push:
    paths:
      - 'whitepaper/**'
  pull_request:
    paths:
      - 'whitepaper/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc pandoc-citeproc \
            texlive-xetex texlive-latex-extra texlive-fonts-recommended \
            fonts-dejavu librsvg2-bin

      - name: Install mermaid-filter
        run: npm install -g mermaid-filter

      - name: Build PDF
        working-directory: whitepaper
        run: make pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: attestium-whitepaper
          path: whitepaper/output/attestium-whitepaper.pdf

      - name: Commit PDF to repo (on push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add attestium-whitepaper.pdf
          git diff --cached --quiet || git commit -m "chore: rebuild whitepaper PDF [skip ci]"
          git push
